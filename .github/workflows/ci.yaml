name: CI
on:
  push:
    branches:
      - main
    tags:
      - 'v**'
  pull_request:
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: setup-go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: generate
        run: make generate
      - name: test
        run: go tool gotestsum --format github-actions
      - name: build
        run: go build -o ${{ runner.temp }}/octl ./
      - name: cli-should-run
        run: ${{ runner.temp }}/octl --version
      - name: lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
      - name: tidy
        run: go mod tidy
      - name: diff
        run: git diff --exit-code
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: build --snapshot
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false

  release:
    needs:
      - test
    permissions:
      contents: write
      issues: write
      id-token: write
      packages: write
      pull-requests: write
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: release
        uses: stellwerk-labs/semantic-release-action@main
        with:
          token: ${{ github.token }}
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ github.token }}
