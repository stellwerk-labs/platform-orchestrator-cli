dockers:
  - dockerfile: goreleaser.Dockerfile
    image_templates:
      - "ghcr.io/stellwerk-labs/octl:{{ .Version }}-amd64"
      - "ghcr.io/stellwerk-labs/octl:{{ .Major }}-amd64"
      - "ghcr.io/stellwerk-labs/octl:{{ .Major }}.{{ .Minor }}-amd64"
      - "ghcr.io/stellwerk-labs/octl:latest-amd64"
    build_flag_templates:
      - "--pull"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.created={{.CommitDate}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--platform=linux/amd64"
    goarch: amd64
  - dockerfile: goreleaser.Dockerfile
    image_templates:
      - "ghcr.io/stellwerk-labs/octl:{{ .Version }}-arm64"
      - "ghcr.io/stellwerk-labs/octl:{{ .Major }}-arm64"
      - "ghcr.io/stellwerk-labs/octl:{{ .Major }}.{{ .Minor }}-arm64"
      - "ghcr.io/stellwerk-labs/octl:latest-arm64"
    build_flag_templates:
      - "--pull"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.created={{.CommitDate}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--platform=linux/arm64"
    goarch: arm64

docker_manifests:
  - name_template: "ghcr.io/stellwerk-labs/octl:{{ .Version }}"
    image_templates:
      - "ghcr.io/stellwerk-labs/octl:{{ .Version }}-amd64"
      - "ghcr.io/stellwerk-labs/octl:{{ .Version }}-arm64"
  - name_template: "ghcr.io/stellwerk-labs/octl:{{ .Major }}"
    image_templates:
      - "ghcr.io/stellwerk-labs/octl:{{ .Major }}-amd64"
      - "ghcr.io/stellwerk-labs/octl:{{ .Major }}-arm64"
  - name_template: "ghcr.io/stellwerk-labs/octl:{{ .Major }}.{{ .Minor }}"
    image_templates:
      - "ghcr.io/stellwerk-labs/octl:{{ .Major }}.{{ .Minor }}-amd64"
      - "ghcr.io/stellwerk-labs/octl:{{ .Major }}.{{ .Minor }}-arm64"
  - name_template: "ghcr.io/stellwerk-labs/octl:latest"
    image_templates:
      - "ghcr.io/stellwerk-labs/octl:latest-amd64"
      - "ghcr.io/stellwerk-labs/octl:latest-arm64"
